<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <h1>Admin Login</h1>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div id="warning" class="warning">Invalid credentials. Please try again.</div>
    </div>
    <div class="categories-swipers">
        <!-- Swipper integration for categories goes here -->
    </div>
    <div class="polish-map">
        <!-- Polish map goes here -->
    </div>
    <div class="radar-integration">
        <!-- Radar functionalities add-on goes here -->
    </div>
    <script src="script.js"></script>
</body>
</html>
